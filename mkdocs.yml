site_name: DCS 404
site_description: Artificial Intelligence and Machine Learning

nav:
  - Welcome: index.md
  - Getting Started:
    - Installation Guide: InstallationGuide.md
  - Machine Learning and AI:
    - Introduction to Machine Learning: DCS404/01_introduction_to_machine_learning.md
    - ML Workflow: DCS404/02_ml_workflow.md
    - Regression: DCS404/03_regression.md
    - Gradient Descent: DCS404/04_gradient_descent.md
    - Regularization: DCS404/05_regularization.md
    - Classification & Logistic Regression: DCS404/06_logistic_regression.md

theme:
  # name: material
  name: readthedocs
  features:
    - header.autohide
    - announce.dismiss
    - navigation.footer
  code:
    highlighting: true
    light: default
    dark: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:      # parse $...$ (inline) and $$...$$ (block) math
      generic: true

extra_javascript:
  - javascripts/mathjax.js                                   # MathJax config (must load first)
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js   # MathJax engine that renders it

extra:
  generator: false

